<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E2F3F"/>
      <stop offset="100%" stop-color="#1B2733"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#08789B"/>
      <stop offset="100%" stop-color="#0AA1CC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo mark (top-left) -->
  <g transform="translate(80, 80)">
    <circle cx="32" cy="32" r="32" fill="url(#accent)"/>
    <circle cx="32" cy="32" r="18" stroke="white" stroke-width="3" fill="none"/>
    <line x1="9" y1="32" x2="55" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="170" y="120" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="36" fill="white" letter-spacing="-0.5">Obralia</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="80" fill="white" letter-spacing="-2.5">Sistema operacional</text>
  <text x="80" y="410" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="80" fill="url(#accent)" letter-spacing="-2.5">da obra.</text>

  <!-- Subhead -->
  <text x="80" y="490" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="30" fill="rgba(255,255,255,0.72)">RDO · EAP · fotos · cronograma · inbox — um lugar só.</text>

  <!-- URL -->
  <text x="80" y="570" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="24" fill="rgba(255,255,255,0.5)">www.obralia.com.br</text>
</svg>
